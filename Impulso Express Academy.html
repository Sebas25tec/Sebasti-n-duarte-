<!DOCTYPE html>
<html >
<head>
  <meta charset="UTF-8">
  <title>Impulso Express Academy</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

<h2 class="text-center mb-3">
  Impulso Express Academy
</h2>

<div id="demo" class="carousel slide" data-bs-ride="carousel">

  <!-- Indicators/dots -->
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active"></button>
    <button type="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
    <button type="button" data-bs-target="#demo" data-bs-slide-to="2"></button>
  </div>
  
  <!-- The slideshow/carousel -->
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="https://blog.endeos.com/wp-content/uploads/2022/06/lenguajes-de-programacion-web.jpg" alt="Programación Web" class="d-block mx-auto" style="width:60%; height:250px; object-fit:cover;">
    </div>
    <div class="carousel-item">
      <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e" alt="Diseño Gráfico" class="d-block mx-auto" style="width:60%; height:250px; object-fit:cover;">
    </div>
    <div class="carousel-item">
      <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f" alt="Marketing Digital" class="d-block mx-auto" style="width:60%; height:250px; object-fit:cover;">
    </div>
  </div>
  
  <!-- Left and right controls/icons -->
  <button class="carousel-control-prev" type="button" data-bs-target="#demo" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#demo" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>
</div>

<form action="matricula.php" method="post">

  <div class="mb-3">
    <label for="nombre" class="form-label">Nombre:</label>
    <input type="text" id="nombre" name="nombre" class="form-control" required>
  </div>

  <div class="mb-3">
    <label for="cedula" class="form-label">Cédula:</label>
    <input type="text" id="cedula" name="cedula" class="form-control"
           pattern="[0-9]{9,12}" title="Ingrese solo números (9 a 12 dígitos)" required>
  </div>

  <div class="mb-3">
    <label for="curso" class="form-label">Curso:</label>
    <select id="curso" name="codigocurso" class="form-select">
      <option value="1">Programación Web</option>
      <option value="2">Diseño Gráfico</option>
      <option value="3">Marketing Digital</option>
      <option value="4">Base de Datos</option>
      <option value="5">Desarrollo de Apps Móviles</option>
    </select>
  </div>

  <div class="mb-3">
    <label for="horario" class="form-label">Horario:</label>
    <select id="horario" name="horario" class="form-select">
      <option value="1">Mañana (8:00 AM - 12:00 PM)</option>
      <option value="2">Tarde (1:00 PM - 5:00 PM)</option>
      <option value="3">Noche (6:00 PM - 9:00 PM)</option>
      <option value="4">Fin de semana (Sábados)</option>
      <option value="5">Intensivo (Lunes a Viernes)</option>
    </select>
  </div>

  <div class="d-grid">
    <button type="submit" class="btn btn-primary">Registrar</button>
  </div>

</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
